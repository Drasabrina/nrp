const ALL_TAGS = [...new Set(RECIPES.flatMap(r => r.tags))].sort();

function App() {
  const [open, setOpen] = React.useState(null);
  const [search, setSearch] = React.useState("");
  const [activeTag, setActiveTag] = React.useState(null);

  const filtered = RECIPES.filter(r => {
    const q = search.toLowerCase();
    const matchSearch = !q || r.nome.toLowerCase().includes(q) || r.tags.some(t => t.includes(q));
    const matchTag = !activeTag || r.tags.includes(activeTag);
    return matchSearch && matchTag;
  });

  const recipe = open ? RECIPES.find(r => r.id === open) : null;

  return (
    <div style={{background: P.bg, minHeight: "100vh", fontFamily: "'Crimson Text', Georgia, serif", color: P.text}}>

      {/* HEADER */}
      <div style={{background: P.accent, padding: "32px 20px 0"}}>
        <div style={{maxWidth: 600, margin: "0 auto"}}>
          <div style={{textAlign:"center", marginBottom: 20}}>
            <div style={{fontFamily:"'Playfair Display', serif", fontSize: 28, color: P.card, letterSpacing: "0.02em"}}>
              Receitas Saudáveis
            </div>
            <div style={{color: P.gold, fontSize: 13, marginTop: 5, letterSpacing: "0.14em", textTransform: "uppercase", fontStyle: "italic"}}>
              por Dra. Sabrina Gois Santos
            </div>
          </div>

          {/* Search */}
          <input
            value={search} onChange={e => setSearch(e.target.value)}
            placeholder="🔍  buscar receitas..."
            style={{width:"100%", background:"rgba(255,255,255,0.1)", border:`1px solid ${P.gold}44`,
              borderRadius:28, padding:"11px 18px", color: P.card, fontSize:16,
              outline:"none", fontFamily:"'Crimson Text', serif", marginBottom:16}}
          />

          {/* Tags */}
          <div style={{display:"flex", gap:8, flexWrap:"wrap", paddingBottom:16, overflowX:"auto"}}>
            <button onClick={() => setActiveTag(null)}
              style={{background: !activeTag ? P.gold : "transparent",
                border:`1px solid ${P.gold}`, color: !activeTag ? P.accent : P.gold,
                borderRadius:20, padding:"4px 14px", fontSize:13, cursor:"pointer",
                fontFamily:"'Crimson Text', serif", whiteSpace:"nowrap", transition:"all 0.15s"}}>
              todas
            </button>
            {ALL_TAGS.map(t => (
              <button key={t} onClick={() => setActiveTag(activeTag === t ? null : t)}
                style={{background: activeTag === t ? P.gold : "transparent",
                  border:`1px solid ${P.gold}`, color: activeTag === t ? P.accent : P.gold,
                  borderRadius:20, padding:"4px 14px", fontSize:13, cursor:"pointer",
                  fontFamily:"'Crimson Text', serif", whiteSpace:"nowrap", transition:"all 0.15s"}}>
                {t}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* COUNT */}
      <div style={{textAlign:"center", padding:"10px 0 6px", fontSize:13, color:P.textLight, fontStyle:"italic"}}>
        {filtered.length} {filtered.length === 1 ? "receita" : "receitas"}
      </div>

      {/* GRID */}
      <div style={{maxWidth:600, margin:"0 auto", padding:"8px 14px 80px"}}>
        {filtered.length === 0 ? (
          <div style={{textAlign:"center", padding:60, color:P.textLight, fontStyle:"italic"}}>
            Nenhuma receita encontrada
          </div>
        ) : (
          <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(200px,1fr))", gap:12}}>
            {filtered.map(r => (
              <div key={r.id} onClick={() => setOpen(r.id)}
                style={{background:P.card, borderRadius:16, padding:16, cursor:"pointer",
                  border:`1px solid ${P.cardDark}`, boxShadow:"0 2px 12px rgba(74,55,40,0.08)",
                  transition:"transform 0.15s, box-shadow 0.15s"}}
                onMouseEnter={e => {e.currentTarget.style.transform="translateY(-2px)"; e.currentTarget.style.boxShadow="0 6px 20px rgba(74,55,40,0.14)"}}
                onMouseLeave={e => {e.currentTarget.style.transform=""; e.currentTarget.style.boxShadow="0 2px 12px rgba(74,55,40,0.08)"}}>
                <div style={{fontFamily:"'Playfair Display', serif", fontSize:16, color:P.accent, marginBottom:3}}>{r.nome}</div>
                {r.subtitulo && <div style={{fontSize:13, color:P.mauva, fontStyle:"italic", marginBottom:6}}>{r.subtitulo}</div>}
                {r.descricao && <div style={{fontSize:13, color:P.textLight, lineHeight:1.5, marginBottom:8}}>{r.descricao}</div>}
                <div>{r.tags.map(t => (
                  <span key={t} style={{display:"inline-block", background:P.rosa, color:P.accent,
                    borderRadius:20, padding:"2px 9px", fontSize:11, margin:"2px 2px 2px 0"}}>{t}</span>
                ))}</div>
                <div style={{marginTop:8, fontSize:12, color:P.textLight}}>🍽 {r.porcoes} {r.porcoes===1?"porção":"porções"}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* FOOTER */}
      <div style={{textAlign:"center", padding:"20px 16px 40px", fontSize:13, color:P.textLight,
        borderTop:`1px solid ${P.cardDark}`, background:P.card}}>
        <div style={{fontFamily:"'Playfair Display', serif", color:P.accent, marginBottom:4}}>Dra. Sabrina Gois Santos</div>
        Pediatra • Homeopata<br/>
        <span style={{color:P.mauva}}>@drasabrina.pediatra</span>
      </div>

      {/* MODAL */}
      {recipe && (
        <div onClick={() => setOpen(null)}
          style={{position:"fixed", inset:0, background:"rgba(44,26,14,0.6)", zIndex:200,
            display:"flex", alignItems:"flex-end", justifyContent:"center", padding:"0"}}>
          <div onClick={e => e.stopPropagation()}
            style={{background:P.bg, borderRadius:"24px 24px 0 0", width:"100%", maxWidth:600,
              maxHeight:"92vh", overflowY:"auto", padding:"0 0 40px"}}>

            {/* Modal header */}
            <div style={{position:"sticky", top:0, background:P.bg, padding:"16px 20px 12px",
              borderBottom:`1px solid ${P.cardDark}`, display:"flex", justifyContent:"space-between", alignItems:"flex-start"}}>
              <div>
                <div style={{fontFamily:"'Playfair Display', serif", fontSize:22, color:P.accent}}>{recipe.nome}</div>
                {recipe.subtitulo && <div style={{fontSize:14, color:P.mauva, fontStyle:"italic"}}>{recipe.subtitulo}</div>}
              </div>
              <button onClick={() => setOpen(null)}
                style={{background:"none", border:"none", fontSize:24, color:P.textLight, cursor:"pointer", lineHeight:1, padding:4}}>×</button>
            </div>

            <div style={{padding:"20px 20px 0"}}>
              {recipe.descricao && (
                <div style={{color:P.textLight, fontSize:16, marginBottom:14, fontStyle:"italic"}}>{recipe.descricao}</div>
              )}
              <div style={{display:"flex", gap:8, flexWrap:"wrap", marginBottom:20}}>
                {recipe.tags.map(t => (
                  <span key={t} style={{background:P.rosa, color:P.accent, borderRadius:20, padding:"3px 12px", fontSize:13}}>{t}</span>
                ))}
                <span style={{fontSize:13, color:P.textLight}}>🍽 {recipe.porcoes} {recipe.porcoes===1?"porção":"porções"}</span>
              </div>

              {/* Ingredientes */}
              <Section title="Ingredientes"/>
              {recipe.ingredientes.map(i => (
                i.q === "— COBERTURA —"
                  ? <div key={i.id} style={{fontSize:12, color:P.gold, textTransform:"uppercase",
                      letterSpacing:"0.1em", padding:"10px 0 6px", fontFamily:"'Playfair Display', serif"}}>Cobertura</div>
                  : <div key={i.id} style={{display:"flex", gap:10, padding:"8px 0",
                      borderBottom:`1px solid ${P.cardDark}`, alignItems:"baseline"}}>
                      <span style={{color:P.accent, fontWeight:600, minWidth:140, fontSize:15}}>{i.q}</span>
                      <span style={{fontSize:15, flex:1}}>{i.n}</span>
                    </div>
              ))}

              {/* Modo de preparo */}
              <Section title="Modo de Preparo" mt={20}/>
              {recipe.passos.map((p, idx) => (
                <div key={p.id} style={{background:P.card, borderRadius:12, padding:14, marginBottom:10,
                  display:"flex", gap:10, border:`1px solid ${P.cardDark}`}}>
                  <div style={{width:26, height:26, borderRadius:"50%", background:P.accent, color:P.card,
                    display:"flex", alignItems:"center", justifyContent:"center",
                    fontSize:12, fontWeight:700, flexShrink:0, marginTop:2}}>{idx+1}</div>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:"'Playfair Display', serif", fontSize:15, color:P.accent, marginBottom:4}}>{p.t}</div>
                    <div style={{fontSize:15, lineHeight:1.65}}>{p.d}</div>
                    {p.timer && (
                      <div style={{marginTop:6, fontSize:12, color:P.gold, background:P.rosa,
                        display:"inline-block", borderRadius:12, padding:"2px 10px"}}>⏱ {p.timer}</div>
                    )}
                  </div>
                </div>
              ))}

              {/* Dicas */}
              {recipe.dicas && (
                <>
                  <Section title="Dicas" mt={4}/>
                  <div style={{padding:"10px 14px", background:"#FFF8EC", borderRadius:10,
                    fontSize:15, borderLeft:`3px solid ${P.gold}`, marginBottom:16}}>{recipe.dicas}</div>
                </>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Section({title, mt=0}) {
  return (
    <div style={{fontFamily:"'Playfair Display', serif", fontSize:12, color:"#A07040",
      borderBottom:"1px solid #E8DCC8", paddingBottom:6, marginBottom:12, marginTop:mt,
      textTransform:"uppercase", letterSpacing:"0.1em"}}>{title}</div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
